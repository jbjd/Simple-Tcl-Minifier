line-length = 88
indent-width = 4

target-version = "py312"

[lint]
select = ["ALL"]

# D202: Newline after doc string (Less readable)
# COM812: Trailing Comma (Only covers single line trailing commas, seems out of place)
# C416: Unnecessary Comprehension (Slower)
# C901: Effectively dupe of PLR0912
# D: Doc style
# D102: Undocumented public method
# D105: Undocumented magic method
# D107: Undocumented public __init__
# D203: Blank line before class (Incompatible with D211)
# D205: Missing blank line after summary (Needless whitespace)
# D213: Multi-line summary second line (Incompatible with D212)
# D401: First line of docstring should be in imperative mood
# D415: Missing terminal punctuatiom (redundant with D400)
# EM: Error messages
# FBT: Boolean Trap (Slower)
# FIX: Fix me
# FURB136: Use min/max instead of if (slower)
# PLC0415: Import should be at top-level
# PLR0912: Too many branches
# PLR0913: Too many arguments
# PLR1730: Use min/max instead of boolean op (slower)
# PLR2004: Magic value used in comparison
# PLW0603: Don't edit global vars
# PTH: Use Pathlib (Wants slower API used)
# PYI021: Docstrings should not be included in stubs (Needed for c extensions)
# SIM105: Slower exception suppression (Wants slower check used)
# SLF001: Private member access
# S105: Hardcoded passwords (why would I do that?)
# S110: Try-Catch-Pass
# S603: Subprocess call: check for untrusted input
# TC001: Move import into a type-checking block (Irrelavent due to compilation)
# TD002: Missing author in TODO
# TD003: Missing issue link in TODO
# TRY003: Avoid specifying long messages outside the exception class (Slower and less clear)
ignore = ["D202", "COM812", "C416", "C901", "D", "D102", "D105", "D107", "D203", "D205", "D213", "D401", "D415", "EM", "FBT", "FIX", "FURB136", "PLC0415", "PLR0912", "PLR0913", "PLR1730", "PLR2004", "PLW0603", "PTH", "PYI021", "SIM105", "SLF001", "S105", "S110", "S603", "TC001", "TD002", "TD003", "TRY003"]

[lint.extend-per-file-ignores]

# S101: Assert
# T201: Print
"perf/*" = ["S101", "T201"]
"run_perf_test.py" = ["S101", "T201"]

# ANN201: Missing return type
# PT011: Pytest raises
"tests/*" = ["ANN201", "PT011", "S101"]

# D104: Missing docstring in public package
"tests/__init__.py" = ["D104"]

[lint.isort]
known-third-party = ["nuitka"]

[format]
quote-style = "double"
indent-style = "space"
